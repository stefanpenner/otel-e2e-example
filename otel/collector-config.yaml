# The hub. Receive OTLP from the apps, then fan out to the 3 backends.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # traces -> Tempo (OTLP/gRPC)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # metrics -> exposed for Prometheus to scrape (pull model)
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true   # turn resource attrs (service.name, ...) into metric labels

  # logs -> Loki (native OTLP ingest)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
