global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # App + custom metrics arrive here, exposed by the collector's prometheus exporter.
  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]

  # Prometheus scraping itself.
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
