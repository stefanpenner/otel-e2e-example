# OTel end-to-end demo. Spin up:  docker compose up -d --build
#
#   simulator (fake GitHub Actions) ─► otel-collector ─┬─► tempo       (traces)
#                                                       ├─► prometheus  (metrics, scrape)
#                                                       └─► loki        (logs)
#                                                  all three ◄── grafana (UI + alerts)

services:
  # ---------------- telemetry pipeline ----------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otel/collector-config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - "14317:4317"   # OTLP gRPC (emit from host)
      - "14318:4318"   # OTLP HTTP (emit from host)
      - "8889:8889"    # prometheus exporter (internal scrape)
    depends_on: [tempo, prometheus, loki]

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo API / TraceQL

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver   # accept Tempo service-graph metrics
      - --enable-feature=exemplar-storage
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceToMetrics"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus, tempo, loki]

  # ---------------- the instrumented "CI/CD system" ----------------
  simulator:
    build: ./app
    environment:
      PORT: "8080"
      PIPELINE_INTERVAL_MS: "4000"   # ambient: fire a run ~every 4s
      FLAKY_RATE: "0.15"             # ~15% of test/lint steps fail
      OTEL_SERVICE_NAME: github-actions
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=demo,cicd.system=github-actions
    ports:
      - "18080:8080"   # POST/GET /trigger to fire a pipeline run
    depends_on: [otel-collector]

volumes:
  tempo-data:
  loki-data:
